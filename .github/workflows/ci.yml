name: CI

on:
  # Run on pushes to the main branch
  push:
    branches: [ "main" ]
  # Run on pull requests targeting the main branch
  pull_request:
    branches: [ "main" ]
  # Run every night at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Allow developers to manually trigger the workflow from the GitHub Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write



    steps:
    - uses: actions/checkout@v4

    # Install uv
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        # Enables caching of uv's virtual environments between runs. This
        # speeds up the workflow significantly on subsequent runs.
        enable-cache: true

    # Set up Python using the .python-version file
    # This looks for the file in the root of your repo by default
    - name: Set up Python
      run: uv python install

    # Install dependencies
    - name: Install the project
      run: uv sync --frozen

    # Check code formatting and lint
    - name: Check code
      run: uvx ruff check . --output-format=github

    # Run tests
    - name: Run tests
      run: uv run pytest --junitxml=junit.xml

    # Show test results in a human friendly way
#    - name: Create Test Result Summary
#      uses: test-summary/action@v2
#      with:
#        paths: "junit.xml"
#      # ensure this runs even if tests fail
#      if: always()

#    - name: Test Report
#      uses: dorny/test-reporter@v1
#      if: always()
#      with:
#        name: Pytest Results
#        path: junit.xml
#        reporter: java-junit # Works perfectly for Python JUnit XML


    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: "junit.xml"